esphome:
  name: waveshare-dashboard
  friendly_name: "Waveshare Dashboard"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "skrapi 2,4GHZ"
  password: "RejtanA77"

web_server:
  port: 80

ota:
  - platform: esphome

time:
  - platform: sntp
    id: my_time
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"

http_request:
  user_agent: esphome/device
  timeout: 15s

sensor:
  - platform: uptime
    name: "Czas pracy panelu"
    
  - platform: wifi_signal
    name: "Siła WiFi"
    update_interval: 60s

  - platform: rest
    resource: "https://api.open-meteo.com/v1/forecast?latitude=54.605&longitude=18.243&current=temperature_2m"
    json_path: "current.temperature_2m"
    id: external_temp
    name: "Temperatura zewnętrzna"
    unit_of_measurement: "°C"
    update_interval: 10min

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Adres IP panelu"

switch:
  - platform: gpio
    name: "Podświetlenie LCD"
    pin: GPIO45
    restore_mode: ALWAYS_ON

i2c:
  sda: GPIO47
  scl: GPIO48
  scan: true

color:
  - id: color_bg
    hex: "121212"
  - id: color_text
    hex: "FFFFFF"
  - id: color_accent
    hex: "00BFFF"

font:
  - file: "gfonts://Roboto"
    id: font_time
    size: 90
  - file: "gfonts://Roboto"
    id: font_temp
    size: 70
  - file: "gfonts://Roboto"
    id: font_small
    size: 30

touchscreen:
  - platform: gt911
    id: my_touch
    display: waveshare_disp

display:
  - platform: rpi_dpi_rgb
    id: waveshare_disp
    dimensions:
      width: 800
      height: 480
    auto_clear_enabled: true
    update_interval: 1s
    pclk_pin: GPIO42
    hsync_pin: GPIO39
    vsync_pin: GPIO41
    de_pin: GPIO40
    data_pins:
      red: [GPIO1, GPIO2, GPIO3, GPIO4, GPIO5]
      green: [GPIO6, GPIO7, GPIO8, GPIO9, GPIO10, GPIO11]
      blue: [GPIO12, GPIO13, GPIO14, GPIO15, GPIO16]
    lambda: |-
      it.fill(id(color_bg));
      
      // Główny zegar na środku
      it.strftime(400, 110, id(font_time), id(color_text), TextAlign::CENTER, "%H:%M", id(my_time).now());
      
      // Nazwa miejscowości
      it.print(400, 220, id(font_small), id(color_accent), TextAlign::CENTER, "Wejherowo");

      // Temperatura pobierana z internetu
      if (id(external_temp).has_state()) {
        it.printf(400, 310, id(font_temp), id(color_text), TextAlign::CENTER, "%.1f °C", id(external_temp).state);
      } else {
        it.print(400, 310, id(font_temp), id(color_text), TextAlign::CENTER, "--.- °C");
      }

      // Mały zegarek w prawym górnym rogu
      it.strftime(760, 35, id(font_small), id(color_text), TextAlign::TOP_RIGHT, "%H:%M", id(my_time).now());
