esphome:
  name: waveshare-dashboard
  friendly_name: Waveshare Dashboard

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

api:

ota:
  - platform: esphome
    password: "12345678"

wifi:
  ssid: "RejtanA77"
  password: "skrapi"

  ap:
    ssid: "Waveshare Dashboard Hotspot"
    password: "12345678"

captive_portal:

web_server:
  port: 80

time:
  - platform: homeassistant
    id: ha_time

sensor:
  - platform: wifi_signal
    name: "Siła WiFi"
    update_interval: 60s

  - platform: uptime
    name: "Czas pracy panelu"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Adres IP panelu"

globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: "0"

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
