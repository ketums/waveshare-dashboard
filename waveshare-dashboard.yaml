esphome:
  name: waveshare-dashboard
  friendly_name: "Waveshare Dashboard"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "skrapi 2,4GHZ"
  password: "RejtanA77"

web_server:
  port: 80

ota:
  - platform: esphome

time:
  - platform: sntp
    id: my_time
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"

# Pobieranie temperatury bezpośrednio przez HTTP z wttr.in dla Wejherowa (zwraca samą liczbę)
text_sensor:
  - platform: http_request
    resource: "https://wttr.in/Wejherowo?format=%t"
    name: "Temperatura z sieci"
    id: temp_zewnetrzna
    update_interval: 15min

  - platform: wifi_info
    ip_address:
      name: "Adres IP panelu"

sensor:
  - platform: uptime
    name: "Czas pracy panelu"
    
  - platform: wifi_signal
    name: "Siła WiFi"
    update_interval: 60s

switch:
  - platform: gpio
    name: "Podświetlenie LCD"
    pin: GPIO45
    restore_mode: ALWAYS_ON

i2c:
  sda: GPIO47
  scl: GPIO48
  scan: true

color:
  - id: color_bg
    hex: "121212"
  - id: color_text
    hex: "FFFFFF"
  - id: color_accent
    hex: "00BFFF"

font:
  - file: "gfonts://Roboto"
    id: font_time
    size: 90
  - file: "gfonts://Roboto"
    id: font_temp
    size: 70

touchscreen:
  - platform: gt911
    id: my_touch
    display: waveshare_disp

display:
  - platform: rpi_dpi_rgb
    id: waveshare_disp
    dimensions:
      width: 800
      height: 480
    auto_clear_enabled: true
    update_interval: 1s
    pclk_pin: GPIO42
    hsync_pin: GPIO39
    vsync_pin: GPIO41
    de_pin: GPIO40
    data_pins:
      red: [GPIO1, GPIO2, GPIO3, GPIO4, GPIO5]
      green: [GPIO6, GPIO7, GPIO8, GPIO9, GPIO10, GPIO11]
      blue: [GPIO12, GPIO13, GPIO14, GPIO15, GPIO16]
    lambda: |-
      // Tło ekranu
      it.fill(id(color_bg));

      // 1. Zegar na samej górze
      it.strftime(400, 80, id(font_time), id(color_text), TextAlign::CENTER, "%H:%M", id(my_time).now());

      // 2. Temperatura bezpośrednio z internetu dla Wejherowa
      if (id(temp_zewnetrzna).has_state()) {
        it.print(400, 220, id(font_temp), id(color_accent), TextAlign::CENTER, id(temp_zewnetrzna).state.c_str());
      } else {
        it.print(400, 220, id(font_temp), id(color_text), TextAlign::CENTER, "Pobieranie...");
      }
      
