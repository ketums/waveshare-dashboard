esphome:
  name: waveshare-dashboard
  friendly_name: "Waveshare Dashboard"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "skrapi 2,4GHZ"
  password: "RejtanA77"

web_server:
  port: 80

ota:
  - platform: esphome

time:
  - platform: sntp
    id: my_time
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"

sensor:
  - platform: uptime
    name: "Czas pracy panelu"
    
  - platform: wifi_signal
    name: "Siła WiFi"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Adres IP panelu"

i2c:
  - id: bus_i2c
    sda: GPIO47
    scl: GPIO48
  - id: ch422g_bus
    sda: GPIO8
    scl: GPIO9
    scan: true

# Ekspander portów CH422G odpowiedzialny m.in. za podświetlenie w tym modelu
output:
  - platform: ch422g
    id: ds_output
    i2c_id: ch422g_bus
    address: 0x24

light:
  - platform: binary
    name: "Podświetlenie LCD"
    output: ds_output
    id: backlight
    output_id: 1

color:
  - id: color_bg
    hex: "121212"
  - id: color_text
    hex: "FFFFFF"
  - id: color_accent
    hex: "00BFFF"

font:
  - file: "gfonts://Roboto"
    id: font_time
    size: 90
  - file: "gfonts://Roboto"
    id: font_temp
    size: 70
  - file: "gfonts://Roboto"
    id: font_small
    size: 30

touchscreen:
  - platform: gt911
    id: my_touch
    display: waveshare_disp
    i2c_id: bus_i2c
    interrupt_pin: GPIO4
    reset_pin: GPIO3

display:
  - platform: rpi_dpi_rgb
    id: waveshare_disp
    dimensions:
      width: 800
      height: 480
    auto_clear_enabled: true
    update_interval: 1s
    pclk_frequency: 14MHz
    hsync_front_porch: 210
    hsync_back_porch: 16
    hsync_pulse_width: 30
    vsync_front_porch: 22
    vsync_back_porch: 13
    vsync_pulse_width: 3
    pclk_pin: GPIO42
    hsync_pin: GPIO39
    vsync_pin: GPIO41
    de_pin: GPIO40
    data_pins:
      red: [GPIO1, GPIO2, GPIO3, GPIO4, GPIO5]
      green: [GPIO6, GPIO7, GPIO8, GPIO9, GPIO10, GPIO11]
      blue: [GPIO12, GPIO13, GPIO14, GPIO15, GPIO16]
    lambda: |-
      it.fill(id(color_bg));
      
      // Główny zegar na środku
      it.strftime(400, 130, id(font_time), id(color_text), TextAlign::CENTER, "%H:%M", id(my_time).now());
      
      // Nazwa miejscowości
      it.print(400, 260, id(font_temp), id(color_accent), TextAlign::CENTER, "Wejherowo");

      // Mały zegarek w prawym górnym rogu
      it.strftime(760, 35, id(font_small), id(color_text), TextAlign::TOP_RIGHT, "%H:%M", id(my_time).now());
