esphome:
  name: waveshare-dashboard
  friendly_name: Waveshare Dashboard

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

api:

ota:
  - platform: esphome
    password: "12345678"

wifi:
  ssid: "skrapi 2,4GHZ"
  password: "RejtanA77"

  ap:
    ssid: "Waveshare Dashboard Hotspot"
    password: "12345678"

captive_portal:

web_server:
  port: 80

time:
  - platform: homeassistant
    id: ha_time

sensor:
  - platform: wifi_signal
    name: "Siła WiFi"
    update_interval: 60s

  - platform: uptime
    name: "Czas pracy panelu"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Adres IP panelu"
sensor:
  - platform: openweathermap
    api_key: ""
    latitude: "43f603e0b341be3dc59f463a6ea78716"
    longitude: 43f603e0b341be3dc59f463a6ea7871618.2366"
    temperature:
      name: "Temperatura"
    humidity:
      name: "Wilgotność"
    wind_speed:
      name: "Prędkość wiatru"
    condition:
      name: "Warunki pogodowe"
      
globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: "0"

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
display:
  - platform: rpi_dpi_rgb
    id: lcd

    color_order: RGB
    pclk_frequency: 16MHz

    dimensions:
      width: 800
      height: 480

    de_pin: GPIO5

    hsync_pin:
      number: GPIO46
      ignore_strapping_warning: true

    vsync_pin:
      number: GPIO3
      ignore_strapping_warning: true

    pclk_pin: GPIO7

    hsync_back_porch: 30
    hsync_front_porch: 210
    hsync_pulse_width: 30

    vsync_back_porch: 4
    vsync_front_porch: 4
    vsync_pulse_width: 4

    data_pins:
      red:
        - GPIO1
        - GPIO2
        - GPIO42
        - GPIO41
        - GPIO40
      green:
        - GPIO39
        - GPIO0
        - GPIO45
        - GPIO48
        - GPIO47
        - GPIO21
      blue:
        - GPIO14
        - GPIO38
        - GPIO18
        - GPIO17
        - GPIO10

ch422g:
  - id: ch422g_hub
output:
  - platform: gpio
    id: lcd_backlight

    pin:
      ch422g: ch422g_hub
      number: 2
      mode:
        output: true
touchscreen:
  - platform: gt911
    id: touch
    display: lcd

    interrupt_pin: GPIO4

    reset_pin:
      ch422g: ch422g_hub
      number: 1

    update_interval: 16ms
light:
  - platform: binary
    id: backlight
    name: "Podświetlenie LCD"
    output: lcd_backlight
    restore_mode: ALWAYS_ON
    
lvgl:
  displays:
    - lcd

  touchscreens:
    - touch

  pages:
    - id: main_page
      widgets:

        - label:
            id: title
            text: "Waveshare Dashboard"
            align: TOP_MID
            y: 20

        - label:
            id: zegar
            text: "--:--"
            align: CENTER

        - label:
            id: status_wifi
            text: "WiFi OK"
            align: BOTTOM_MID
            y: -20
