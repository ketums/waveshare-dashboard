esphome:
  name: waveshare-dashboard
  friendly_name: "Waveshare Dashboard"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3

# Konfiguracja pamięci niezbędna dla wyświetlacza
psram:
  mode: octal
  speed: 80MHz

# Konfiguracja WiFi
wifi:
  ssid: "skrapi 2,4GHZ"
  password: "RejtanA77"

# Serwer WWW widoczny na Twoim zrzucie ekranu
web_server:
  port: 80

# Aktualizacje OTA
ota:
  - platform: esphome

# Sensory (Uptime i siła WiFi)
sensor:
  - platform: uptime
    name: "Czas pracy panelu"
  - platform: wifi_signal
    name: "Siła WiFi"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Adres IP panelu"

switch:
  - platform: gpio
    name: "Podświetlenie LCD"
    pin: GPIO2 
    restore_mode: ALWAYS_ON

# Konfiguracja I2C dla dotyku
i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true

# Kolory i czcionka dla ekranu
color:
  - id: color_black
    hex: "000000"
  - id: color_white
    hex: "FFFFFF"

font:
  - file: "gfonts://Roboto"
    id: font_roboto_large
    size: 50

# Ekran dotykowy
touchscreen:
  - platform: gt911
    id: my_touch
    display: waveshare_disp

# Wyświetlacz
display:
  - platform: rpi_dpi_rgb
    id: waveshare_disp
    dimensions:
      width: 800
      height: 480
    auto_clear_enabled: true
    update_interval: 1s
    
    pclk_pin: GPIO42
    hsync_pin: GPIO39
    vsync_pin: GPIO41
    de_pin: GPIO40
    
    data_pins:
      red: [GPIO1, GPIO2, GPIO3, GPIO4, GPIO5]
      green: [GPIO6, GPIO7, GPIO8, GPIO9, GPIO10, GPIO11]
      blue: [GPIO12, GPIO13, GPIO14, GPIO15, GPIO16]
    
    lambda: |-
      it.fill(id(color_black));
      it.printf(400, 240, id(font_roboto_large), id(color_white), TextAlign::CENTER, "SYSTEM GOTOWY");
