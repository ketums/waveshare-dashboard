esphome:
  name: waveshare-dashboard
  friendly_name: "Waveshare Dashboard"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "skrapi 2,4GHZ"
  password: "RejtanA77"

web_server:
  port: 80

ota:
  - platform: esphome

time:
  - platform: sntp
    id: my_time
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"

# Konfiguracja klienta HTTP
http_request:
  verify_ssl: false
  timeout: 15s

sensor:
  - platform: uptime
    name: "Czas pracy panelu"
    
  - platform: wifi_signal
    name: "Siła WiFi"
    update_interval: 60s

  # Wirtualne sensory dla pogody z internetu
  - platform: template
    id: out_temp
    name: "Temperatura zewnętrzna"
    unit_of_measurement: "°C"

  - platform: template
    id: wmo_code
    name: "Kod pogody"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Adres IP panelu"

  # Wirtualny sensor z nazwą "ikony"
  - platform: template
    id: weather_desc
    name: "Opis pogody"

# Automatyczne pobieranie danych co 10 minut za pomocą skryptu C++
interval:
  - interval: 10min
    startup_delay: 5s
    then:
      - http_request.get:
          url: "https://api.open-meteo.com/v1/forecast?latitude=54.605&longitude=18.243&current=temperature_2m,weather_code"
          on_response:
            then:
              - lambda: |-
                  json::parse_json(body, [](JsonObject root) {
                    if (root.containsKey("current")) {
                      float temp = root["current"]["temperature_2m"];
                      int code = root["current"]["weather_code"];
                      id(out_temp).publish_state(temp);
                      id(wmo_code).publish_state(code);
                      
                      // Zamiana kodu z internetu na polski opis pełniący rolę ikony
                      if (code == 0) id(weather_desc).publish_state("Slonecznie");
                      else if (code == 1 || code == 2 || code == 3) id(weather_desc).publish_state("Pochmurno");
                      else if (code == 45 || code == 48) id(weather_desc).publish_state("Mgla");
                      else if (code >= 51 && code <= 67) id(weather_desc).publish_state("Deszcz");
                      else if (code >= 71 && code <= 86) id(weather_desc).publish_state("Snieg");
                      else if (code >= 95) id(weather_desc).publish_state("Burza");
                      else id(weather_desc).publish_state("Nieznana");
                    }
                  });

switch:
  - platform: gpio
    name: "Podświetlenie LCD"
    pin: GPIO45
    restore_mode: ALWAYS_ON

i2c:
  sda: GPIO47
  scl: GPIO48
  scan: true

color:
  - id: color_bg
    hex: "121212"
  - id: color_text
    hex: "FFFFFF"
  - id: color_accent
    hex: "00BFFF"

font:
  - file: "gfonts://Roboto"
    id: font_time
    size: 90
  - file: "gfonts://Roboto"
    id: font_temp
    size: 70
  - file: "gfonts://Roboto"
    id: font_small
    size: 30
  - file: "gfonts://Roboto"
    id: font_weather
    size: 50

touchscreen:
  - platform: gt911
    id: my_touch
    display: waveshare_disp

display:
  - platform: rpi_dpi_rgb
    id: waveshare_disp
    dimensions:
      width: 800
      height: 480
    auto_clear_enabled: true
    update_interval: 1s
    pclk_pin: GPIO42
    hsync_pin: GPIO39
    vsync_pin: GPIO41
    de_pin: GPIO40
    data_pins:
      red: [GPIO1, GPIO2, GPIO3, GPIO4, GPIO5]
      green: [GPIO6, GPIO7, GPIO8, GPIO9, GPIO10, GPIO11]
      blue: [GPIO12, GPIO13, GPIO14, GPIO15, GPIO16]
    lambda: |-
      it.fill(id(color_bg));
      
      // Zegar na środku
      it.strftime(400, 80, id(font_time), id(color_text), TextAlign::CENTER, "%H:%M", id(my_time).now());
      
      // Napis Wejherowo
      it.print(400, 190, id(font_small), id(color_accent), TextAlign::CENTER, "Wejherowo");

      // Temperatura pobrana z neta
      if (id(out_temp).has_state()) {
        it.printf(400, 260, id(font_temp), id(color_text), TextAlign::CENTER, "%.1f C", id(out_temp).state);
      } else {
        it.print(400, 260, id(font_temp), id(color_text), TextAlign::CENTER, "--.- C");
      }

      // Status pogody (Zastępuje grafikę, żeby uniknąć błędu kompilatora)
      if (id(weather_desc).has_state()) {
        it.printf(400, 360, id(font_weather), id(color_accent), TextAlign::CENTER, "%s", id(weather_desc).state.c_str());
      }

      // Mały zegarek w prawym górnym rogu
      it.strftime(760, 35, id(font_small), id(color_text), TextAlign::TOP_RIGHT, "%H:%M", id(my_time).now());
