esphome:
  name: waveshare-dashboard
  friendly_name: "Waveshare Dashboard"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

# Konfiguracja pamięci niezbędna dla wyświetlacza
psram:
  mode: octal
  speed: 80MHz

# Konfiguracja WiFi
wifi:
  ssid: "skrapi 2,4GHZ"
  password: "RejtanA77"

# Serwer WWW widoczny pod adresem IP
web_server:
  port: 80

# Aktualizacje OTA
ota:
  - platform: esphome

# Czas z internetu (strefa czasowa dla Polski)
time:
  - platform: sntp
    id: my_time
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"

# Konfiguracja pogody z OpenWeatherMap dla Wejherowa
weather:
  - platform: openweathermap
    id: my_weather
    api_key: "43f603e0b341be3dc59f463a6ea78716"
    latitude: 54.604
    longitude: 18.236

# Sensory systemowe
sensor:
  - platform: uptime
    name: "Czas pracy panelu"
    
  - platform: wifi_signal
    name: "Siła WiFi"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Adres IP panelu"

# Przełącznik podświetlenia LCD (bezpieczny pin)
switch:
  - platform: gpio
    name: "Podświetlenie LCD"
    pin: GPIO45
    restore_mode: ALWAYS_ON

# Konfiguracja I2C dla dotyku (bezpieczne piny)
i2c:
  sda: GPIO47
  scl: GPIO48
  scan: true

# Kolory dla interfejsu
color:
  - id: color_bg
    hex: "121212"
  - id: color_text
    hex: "FFFFFF"
  - id: color_accent
    hex: "00BFFF"

# Zestaw czcionek
font:
  - file: "gfonts://Roboto"
    id: font_time
    size: 90
  - file: "gfonts://Roboto"
    id: font_temp
    size: 70

# Deklaracja animacji graficznych (pliki GIF muszą być w tym samym folderze co kod)
animation:
  - file: "sun.gif"
    id: anim_sun
  - file: "cloud.gif"
    id: anim_cloud
  - file: "rain.gif"
    id: anim_rain

# Ekran dotykowy
touchscreen:
  - platform: gt911
    id: my_touch
    display: waveshare_disp

# Wyświetlacz RGB i rysowanie interfejsu
display:
  - platform: rpi_dpi_rgb
    id: waveshare_disp
    dimensions:
      width: 800
      height: 480
    auto_clear_enabled: true
    update_interval: 1s
    pclk_pin: GPIO42
    hsync_pin: GPIO39
    vsync_pin: GPIO41
    de_pin: GPIO40
    data_pins:
      red: [GPIO1, GPIO2, GPIO3, GPIO4, GPIO5]
      green: [GPIO6, GPIO7, GPIO8, GPIO9, GPIO10, GPIO11]
      blue: [GPIO12, GPIO13, GPIO14, GPIO15, GPIO16]
    lambda: |-
      // Tło ekranu
      it.fill(id(color_bg));

      // 1. Zegar na samej górze
      it.strftime(400, 80, id(font_time), id(color_text), TextAlign::CENTER, "%H:%M", id(my_time).now());

      // 2. Temperatura z internetu (OpenWeatherMap)
      it.printf(400, 220, id(font_temp), id(color_accent), TextAlign::CENTER, "%.1f °C", id(my_weather).temperature);

      // 3. Wyświetlanie animacji na podstawie statusu pogody
      auto condition = id(my_weather).condition;
      
      if (condition == weather::WEATHER_CONDITION_SUNNY || condition == weather::WEATHER_CONDITION_CLEAR_NIGHT) {
        // Rysuje słońce (współrzędne X:350, Y:300 - dostosuj według wielkości swojego GIF-a)
        it.image(350, 300, id(anim_sun)); 
      } 
      else if (condition == weather::WEATHER_CONDITION_RAINY || condition == weather::WEATHER_CONDITION_POURING || condition == weather::WEATHER_CONDITION_LIGHTNING_RAIN) {
        // Rysuje deszcz
        it.image(350, 300, id(anim_rain));
      } 
      else {
        // Wszystkie pozostałe stany (chmury, mgła, śnieg)
        it.image(350, 300, id(anim_cloud));
      }
      
